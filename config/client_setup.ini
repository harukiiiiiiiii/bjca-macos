[update]
# 在线升级配置
# Online update configuration
Install = on
updateserverurl_1 = http://update.bjca.org.cn/service/update2
updateserverurl_3 = http://update.bjca.org.cn/service/update2

[driver]
# USB Key 驱动类型配置 (macOS 兼容型号)
# macOS-compatible USB Key driver types
# 注意: macOS 上只需要 CCID 兼容的 Key，无需额外驱动
type = epass2000 epass3000 OTGHIDCSP

[UseCSS]
# CSS 证书安全系统 (macOS 上默认关闭)
filename = /Library/BJCA/data/aideinternet.ini
cssconfig = 0

[WLAN]
filename = /Library/BJCA/data/aideinternet.ini
wlanType = 2
UpdateAdress = https://userweb.bjca.org.cn/bossuserweb/onlineupdate.aspx
HelpAdress = http://help.bjca.org.cn

[daysofcertenddate]
filename = /Library/BJCA/data/aideinternet.ini
thedays = 60

[CertAideTray]
# macOS 上以 launchd service 运行，替代 Windows 托盘程序
InstallTrayFlag = on
AutoRunTrayFlag = on

[server]
# macOS 服务配置
listen_host = 127.0.0.1
listen_port = 21061
log_level = info

[pkcs11]
# PKCS#11 模块搜索路径 (macOS)
module_paths =
    /Library/BJCA/lib/libbjcapkcs11.dylib
    /usr/local/lib/libeTPKCS11.dylib
    /opt/homebrew/lib/libeTPKCS11.dylib
    /usr/local/lib/opensc-pkcs11.so
    /opt/homebrew/lib/opensc-pkcs11.so
    /opt/homebrew/lib/pkcs11/opensc-pkcs11.so
